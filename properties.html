<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Property listings – houses, land, commercial properties for sale in Tamil Nadu." />
  <title>Properties | WELCOME ENTERPRISES – TAJ REAL ESTATE</title>
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body data-page="properties">
  <div id="navbar-root"></div>
  <header class="page-header"><div class="container"><h1>Property <span style="color:var(--gold-400)">Listings</span></h1><p>Find your dream property with expert guidance</p></div></header>

  <section class="section">
    <div class="container">
      <div class="filters-bar">
        <select id="filter-location"><option value="">All Locations</option></select>
        <select id="filter-budget">
          <option value="">Any Budget</option>
          <option value="2000000">Under ₹20 Lakh</option>
          <option value="5000000">Under ₹50 Lakh</option>
          <option value="10000000">Under ₹1 Crore</option>
          <option value="999999999">Any Price</option>
        </select>
        <select id="filter-type">
          <option value="">All Types</option>
          <option value="house">House</option>
          <option value="land">Land</option>
          <option value="commercial">Commercial</option>
        </select>
      </div>
      <div class="card-grid" id="property-grid"></div>
    </div>
  </section>

  <div class="modal-overlay" id="property-modal">
    <div class="modal"><button class="modal-close">&times;</button><h3 id="modal-title"></h3><div id="modal-body"></div></div>
  </div>

  <div id="footer-root"></div>
  <script src="js/i18n.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/properties.js"></script>
</body>
</html>
